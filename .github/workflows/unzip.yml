name: Auto Unzip

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP files
        run: |
          find . -name "*.zip" | while read zip; do
            dir="${zip%.zip}"
            mkdir -p "$dir"
            unzip -o "$zip" -d "$dir"
            rm "$zip"
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Auto extract ZIP files"
          git push
